name: Codelabs CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:

  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install claat
        run: go install github.com/googlecodelabs/tools/claat@latest

      - name: Find codelab files
        run: |
          find . -name '*.md' \
            -not -path './.github/*' \
            -not -name 'README.md' | tee codelab-files.txt
          echo "Found $(wc -l < codelab-files.txt) codelab(s)"

      - name: Validate metadata
        run: |
          ERRORS=0
          while IFS= read -r f; do
            for FIELD in summary id categories authors status; do
              if ! grep -q "^${FIELD}:" "$f"; then
                echo "ERROR: Missing $FIELD in $f"
                ERRORS=$((ERRORS+1))
              fi
            done
          done < codelab-files.txt
          if [ $ERRORS -gt 0 ]; then exit 1; fi
          echo 'All metadata valid'

      - name: Check step count
        run: |
          while IFS= read -r f; do
            STEPS=$(grep -c '^## ' "$f" || true)
            if [ "$STEPS" -lt 2 ]; then
              echo "WARNING: $f has only $STEPS step(s) (min 3 recommended)"
            else
              echo "OK: $f has $STEPS steps"
            fi
          done < codelab-files.txt

      - name: Export codelabs with claat
        run: |
          mkdir -p exported
          while IFS= read -r f; do
            echo "Exporting: $f"
            claat export -o exported "$f" || exit 1
          done < codelab-files.txt
          echo 'All codelabs exported'

      - name: Validate exported structure
        run: |
          for dir in exported/*/; do
            [ -f "${dir}index.html" ] || { echo "Missing index.html in $dir"; exit 1; }
            [ -f "${dir}codelab.json" ] || { echo "Missing codelab.json in $dir"; exit 1; }
            echo "OK: $dir"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exported-codelabs
          path: exported/
          retention-days: 7

      - name: Quality Summary
        if: always()
        run: |
          COUNT=$(wc -l < codelab-files.txt | tr -d ' ')
          echo '## Quality Check Summary' >> $GITHUB_STEP_SUMMARY
          echo '| Check | Status |' >> $GITHUB_STEP_SUMMARY
          echo '|-------|--------|' >> $GITHUB_STEP_SUMMARY
          echo '| Metadata | Passed |' >> $GITHUB_STEP_SUMMARY
          echo '| claat export | Passed |' >> $GITHUB_STEP_SUMMARY
          echo '| Structure | Passed |' >> $GITHUB_STEP_SUMMARY
          echo "| Codelabs checked | $COUNT |" >> $GITHUB_STEP_SUMMARY

  build-and-deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install claat
        run: go install github.com/googlecodelabs/tools/claat@latest

      - name: Export all codelabs
        run: |
          mkdir -p _site
          find . -name '*.md' \
            -not -path './.github/*' \
            -not -name 'README.md' | while IFS= read -r f; do
            claat export -o _site "$f"
          done
          echo 'Build complete'

      - name: Inject step-lock script
        run: |
          cp assets/step-lock.js _site/step-lock.js
          for dir in _site/*/; do
            if [ -f "${dir}index.html" ]; then
              sed -i 's|</body>|<script src="../step-lock.js"></script>\n</body>|' "${dir}index.html"
              echo "Injected step-lock into ${dir}index.html"
            fi
          done
          echo 'Step-lock script injected into all codelabs'

      - name: Generate landing pages (current batch + alumni)
        run: |
          python3 << 'PYSCRIPT'
          import json, os, glob

          # Load visibility config
          with open("codelabs-config.json") as f:
              config = json.load(f)

          # Discover all exported codelabs
          codelabs = []
          for cj in glob.glob("_site/*/codelab.json"):
              with open(cj) as f:
                  data = json.load(f)
              cid = data.get("id", os.path.basename(os.path.dirname(cj)))
              title = data.get("title", "Untitled")
              cfg = config.get(cid, {"unlocked": True, "order": 99})
              codelabs.append({
                  "id": cid,
                  "title": title,
                  "unlocked": cfg.get("unlocked", True),
                  "order": cfg.get("order", 99)
              })

          codelabs.sort(key=lambda x: x["order"])

          # --- Card HTML generators ---
          def unlocked_card(c):
              return (f'<div class="card">'
                      f'<h3>{c["title"]}</h3>'
                      f'<a href="{c["id"]}/">Start Lab</a>'
                      f'</div>')

          def locked_card(c):
              return (f'<div class="card locked" data-id="{c["id"]}">'
                      f'<h3>{c["title"]}</h3>'
                      f'<span class="badge">Coming Soon</span>'
                      f'</div>')

          # --- Admin unlock script (injected only on main landing page) ---
          ADMIN_SCRIPT = """<script>
          (function(){
            try {
              var xhr = new XMLHttpRequest();
              xhr.open('GET', '/cdn-cgi/access/get-identity', false);
              xhr.send();
              if (xhr.status === 200) {
                var data = JSON.parse(xhr.responseText);
                var email = (data.email || '').toLowerCase();
                var ADMIN_EMAILS = ['iamawannadole@gmail.com'];
                if (ADMIN_EMAILS.indexOf(email) !== -1) {
                  var locked = document.querySelectorAll('.card.locked');
                  for (var i = 0; i < locked.length; i++) {
                    var card = locked[i];
                    var id = card.getAttribute('data-id');
                    if (!id) continue;
                    card.classList.remove('locked');
                    var badge = card.querySelector('.badge');
                    if (badge) {
                      var link = document.createElement('a');
                      link.href = id + '/';
                      link.textContent = 'Start Lab';
                      badge.parentNode.replaceChild(link, badge);
                    }
                  }
                }
              }
            } catch(e) {}
          })();
          </script>"""

          # --- HTML template ---
          def page_html(title, subtitle, cards_html, admin_script=False):
              script_block = ADMIN_SCRIPT if admin_script else ""
              return f'''<!DOCTYPE html>
          <html lang="en">
          <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
          <title>{title}</title>
          <style>
          body{{font-family:'Google Sans',sans-serif;background:#f1f3f4;margin:0}}
          header{{background:#1a73e8;color:#fff;padding:2rem;text-align:center}}
          header h1{{margin:0;font-size:2rem}}
          header p{{margin:.5rem 0 0;opacity:.9}}
          main{{max-width:1100px;margin:2rem auto;padding:0 1rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}}
          .card{{background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:box-shadow .2s}}
          .card:hover{{box-shadow:0 6px 20px rgba(0,0,0,.15)}}
          .card h3{{color:#202124;margin:0 0 1rem}}
          .card a{{background:#1a73e8;color:#fff;padding:.5rem 1.2rem;border-radius:6px;text-decoration:none;font-weight:500;display:inline-block}}
          .card.locked{{opacity:.55;pointer-events:none;filter:grayscale(.5)}}
          .card.locked h3{{color:#5f6368}}
          .badge{{background:#dadce0;color:#5f6368;padding:.4rem 1rem;border-radius:6px;font-size:.85rem;font-weight:500;display:inline-block}}
          footer{{text-align:center;padding:2rem;color:#5f6368}}
          </style></head>
          <body>
          <header>
            <h1>{title}</h1>
            <p>{subtitle}</p>
          </header>
          <main>{cards_html}</main>
          <footer>Built with Google Codelabs &bull; HitaVirTech &copy; 2026</footer>
          {script_block}
          </body></html>'''

          # --- 1. Current batch landing page (index.html) ---
          batch_cards = ""
          for c in codelabs:
              batch_cards += unlocked_card(c) if c["unlocked"] else locked_card(c)

          with open("_site/index.html", "w") as f:
              f.write(page_html(
                  "HitaVirTech Codelabs",
                  "Data Engineering Hands-on Labs &mdash; Batch 5 &bull; April 2026",
                  batch_cards,
                  admin_script=True
              ))
          print("Generated: _site/index.html (current batch)")

          # --- 2. Alumni landing page (all/index.html) ---
          os.makedirs("_site/all", exist_ok=True)
          all_cards = ""
          for c in codelabs:
              all_cards += f'<div class="card"><h3>{c["title"]}</h3><a href="../{c["id"]}/">Start Lab</a></div>'

          with open("_site/all/index.html", "w") as f:
              f.write(page_html(
                  "HitaVirTech Codelabs",
                  "All Codelabs &mdash; Full Access",
                  all_cards
              ))
          print("Generated: _site/all/index.html (alumni - all unlocked)")

          # --- Summary ---
          unlocked = [c for c in codelabs if c["unlocked"]]
          locked = [c for c in codelabs if not c["unlocked"]]
          print(f"\n{'='*60}")
          print(f"LANDING PAGE SUMMARY")
          print(f"{'='*60}")
          print(f"Total codelabs found: {len(codelabs)}")
          print(f"Unlocked: {len(unlocked)} | Locked: {len(locked)}")
          print(f"")
          for c in codelabs:
              status = "UNLOCKED" if c["unlocked"] else "LOCKED  "
              print(f"  [{status}] {c['order']}. {c['id']} — {c['title']}")
          print(f"{'='*60}")
          PYSCRIPT
          echo 'Landing pages generated'

      - name: Copy Cloudflare config files into _site
        run: |
          cp _headers _site/_headers 2>/dev/null || true
          cp _redirects _site/_redirects 2>/dev/null || true
          cp access-help.html _site/access-help.html 2>/dev/null || true
          echo 'Cloudflare config files copied'

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=hitavirtech-codelabs

      - name: Deployment Summary
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          echo '## Deployment Complete' >> $GITHUB_STEP_SUMMARY
          echo 'Deployed to Cloudflare Pages!' >> $GITHUB_STEP_SUMMARY
          echo 'Live URL: https://codelabs.hitavirtech.com' >> $GITHUB_STEP_SUMMARY
