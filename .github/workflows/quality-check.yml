name: Codelab Quality Check

on:
  push:
      branches: [ main ]
        pull_request:
            branches: [ main ]

            jobs:
              quality-check:
                  name: Quality Check
                      runs-on: ubuntu-latest

                          steps:
                                - name: Checkout repository
                                        uses: actions/checkout@v4

                                              - name: Set up Go (for claat)
                                                      uses: actions/setup-go@v5
                                                              with:
                                                                        go-version: '1.21'

                                                                              - name: Install claat
                                                                                      run: go install github.com/googlecodelabs/tools/claat@latest

                                                                                            - name: Check claat version
                                                                                                    run: claat version
                                                                                                    
                                                                                                          - name: Find all codelab markdown files
                                                                                                                  id: find-codelabs
                                                                                                                          run: |
                                                                                                                                    echo "Scanning for codelab markdown files..."
                                                                                                                                              find . -name "*.md" -not -path "./.github/*" -not -name "README.md" | tee codelab-files.txt
                                                                                                                                                        COUNT=$(wc -l < codelab-files.txt)
                                                                                                                                                                  echo "Found $COUNT codelab markdown file(s)"
                                                                                                                                                                            echo "count=$COUNT" >> $GITHUB_OUTPUT
                                                                                                                                                                            
                                                                                                                                                                                  - name: Validate codelab metadata
                                                                                                                                                                                          run: |
                                                                                                                                                                                                    echo "=== Validating codelab metadata ==="
                                                                                                                                                                                                              ERRORS=0
                                                                                                                                                                                                                        while IFS= read -r file; do
                                                                                                                                                                                                                                    echo "Checking: $file"
                                                                                                                                                                                                                                                if ! grep -q "^summary:" "$file"; then
                                                                                                                                                                                                                                                              echo "  ERROR: Missing 'summary:' in $file"
                                                                                                                                                                                                                                                                            ERRORS=$((ERRORS+1))
                                                                                                                                                                                                                                                                                        fi
                                                                                                                                                                                                                                                                                                    if ! grep -q "^id:" "$file"; then
                                                                                                                                                                                                                                                                                                                  echo "  ERROR: Missing 'id:' in $file"
                                                                                                                                                                                                                                                                                                                                ERRORS=$((ERRORS+1))
                                                                                                                                                                                                                                                                                                                                            fi
                                                                                                                                                                                                                                                                                                                                                        if ! grep -q "^categories:" "$file"; then
                                                                                                                                                                                                                                                                                                                                                                      echo "  WARNING: Missing 'categories:' in $file"
                                                                                                                                                                                                                                                                                                                                                                                  fi
                                                                                                                                                                                                                                                                                                                                                                                              if ! grep -q "^authors:" "$file"; then
                                                                                                                                                                                                                                                                                                                                                                                                            echo "  WARNING: Missing 'authors:' in $file"
                                                                                                                                                                                                                                                                                                                                                                                                                        fi
                                                                                                                                                                                                                                                                                                                                                                                                                                    if ! grep -q "^status:" "$file"; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "  WARNING: Missing 'status:' in $file"
                                                                                                                                                                                                                                                                                                                                                                                                                                                              fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "  OK: $file"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    done < codelab-files.txt
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if [ $ERRORS -gt 0 ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "FAILED: $ERRORS error(s) found in codelab metadata"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      exit 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "All metadata checks passed!"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Export codelabs with claat
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "=== Exporting codelabs ==="
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            mkdir -p exported
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      FAILED=0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                while IFS= read -r file; do
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "Exporting: $file"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if claat export -o exported "$file"; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "  SUCCESS: $file exported"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "  FAILED: Could not export $file"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              FAILED=$((FAILED+1))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    done < codelab-files.txt
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if [ $FAILED -gt 0 ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "FAILED: $FAILED codelab(s) could not be exported"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      exit 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "All codelabs exported successfully!"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Check exported output structure
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "=== Checking exported output ==="
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            for dir in exported/*/; do
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "Checking: $dir"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if [ ! -f "${dir}index.html" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "  ERROR: Missing index.html in $dir"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                exit 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if [ ! -f "${dir}codelab.json" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "  ERROR: Missing codelab.json in $dir"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    exit 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "  OK: $dir has index.html and codelab.json"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:

  # ── JOB 1: Quality Check ──────────────────────
  quality-check:
    name: '✅ Quality Check'
    runs-on: ubuntu-latest
    outputs:
      codelab-count: ${{ steps.find.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install claat
        run: go install github.com/googlecodelabs/tools/claat@latest

      - name: Find codelab markdown files
        id: find
        run: |
          find . -name '*.md' -not -path './.github/*' -not -name 'README.md' | tee codelab-files.txt
          COUNT=$(wc -l < codelab-files.txt | tr -d ' ')
          echo "Found $COUNT codelab(s)"
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Validate codelab metadata
        run: |
          ERRORS=0
          while IFS= read -r f; do
            echo "Checking: $f"
            for FIELD in summary id categories authors status; do
              if ! grep -q "^${FIELD}:" "$f"; then
                echo "  ERROR: Missing '$FIELD' in $f"
                ERRORS=$((ERRORS+1))
              fi
            done
          done < codelab-files.txt
          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS metadata error(s) found"
            exit 1
          fi
          echo '✅ All metadata valid'

      - name: Check minimum step count
        run: |
          WARN=0
          while IFS= read -r f; do
            STEPS=$(grep -c '^## ' "$f" || true)
            echo "  $f: $STEPS step(s)"
            if [ "$STEPS" -lt 2 ]; then
              echo "::warning file=$f::Only $STEPS step(s) found (recommend at least 3)"
              WARN=$((WARN+1))
            fi
          done < codelab-files.txt
          echo "Step check complete. $WARN warning(s)."

      - name: Export codelabs with claat
        run: |
          mkdir -p exported
          FAILED=0
          while IFS= read -r f; do
            echo "Exporting: $f"
            if claat export -o exported "$f"; then
              echo "  ✅ Exported: $f"
            else
              echo "  ❌ Failed: $f"
              FAILED=$((FAILED+1))
            fi
          done < codelab-files.txt
          if [ $FAILED -gt 0 ]; then
            echo "::error::$FAILED codelab(s) failed to export"
            exit 1
          fi

      - name: Validate exported structure
        run: |
          for dir in exported/*/; do
            [ -f "${dir}index.html" ] || { echo "::error::Missing index.html in $dir"; exit 1; }
            [ -f "${dir}codelab.json" ] || { echo "::error::Missing codelab.json in $dir"; exit 1; }
            echo "  ✅ $dir structure OK"
          done

      - name: Upload exported codelabs artifact
        uses: actions/upload-artifact@v4
        with:
          name: exported-codelabs
          path: exported/
          retention-days: 7

      - name: Quality Summary
        if: always()
        run: |
          COUNT=$(wc -l < codelab-files.txt | tr -d ' ')
          echo '## ✅ Quality Check Summary' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| Check | Status |' >> $GITHUB_STEP_SUMMARY
          echo '|-------|--------|' >> $GITHUB_STEP_SUMMARY
          echo '| Metadata validation | ✅ Passed |' >> $GITHUB_STEP_SUMMARY
          echo '| claat export | ✅ Passed |' >> $GITHUB_STEP_SUMMARY
          echo '| Output structure | ✅ Passed |' >> $GITHUB_STEP_SUMMARY
          echo "| **Total codelabs** | **$COUNT** |" >> $GITHUB_STEP_SUMMARY

  # ── JOB 2: Build Site ─────────────────────────
  build:
    name: '🏗️ Build Site'
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install claat
        run: go install github.com/googlecodelabs/tools/claat@latest

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Export all codelabs
        run: |
          mkdir -p _site
          find . -name '*.md' -not -path './.github/*' -not -name 'README.md' | while IFS= read -r f; do
            claat export -o _site "$f"
          done
          echo '✅ All codelabs exported to _site/'

      - name: Generate landing index.html
        run: |
          CODELABS_JSON='['
          FIRST=true
          for dir in _site/*/; do
            if [ -f "${dir}codelab.json" ]; then
              TITLE=$(python3 -c "import json,sys; d=json.load(open('${dir}codelab.json')); print(d.get('title','Unknown'))" 2>/dev/null || echo 'Unknown')
              ID=$(basename "$dir")
              [ "$FIRST" = true ] || CODELABS_JSON="$CODELABS_JSON,"
              CODELABS_JSON="${CODELABS_JSON}{\"id\":\"$ID\",\"title\":\"$TITLE\"}"
              FIRST=false
            fi
          done
          CODELABS_JSON="${CODELABS_JSON}]"
          cat > _site/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang='en'>
          <head>
            <meta charset='UTF-8'>
            <meta name='viewport' content='width=device-width,initial-scale=1'>
            <title>HitaVirTech Codelabs - Batch 5</title>
            <link href='https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap' rel='stylesheet'>
            <style>
              *{box-sizing:border-box;margin:0;padding:0}
              body{font-family:'Google Sans',sans-serif;background:#f1f3f4;min-height:100vh}
              header{background:#1a73e8;color:white;padding:2rem;text-align:center}
              header h1{font-size:2rem;margin-bottom:0.5rem}
              header p{opacity:0.85}
              main{max-width:1100px;margin:2rem auto;padding:0 1rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem}
              .card{background:white;border-radius:12px;padding:1.5rem;box-shadow:0 1px 4px rgba(0,0,0,0.12);transition:box-shadow 0.2s}
              .card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.18)}
              .card h3{color:#202124;margin-bottom:0.75rem}
              .card a{display:inline-block;margin-top:1rem;background:#1a73e8;color:white;padding:0.5rem 1.2rem;border-radius:6px;text-decoration:none;font-weight:500}
              .badge{background:#e8f0fe;color:#1a73e8;padding:3px 10px;border-radius:12px;font-size:0.75rem;font-weight:500}
              footer{text-align:center;padding:2rem;color:#5f6368;font-size:0.9rem}
            </style>
          </head>
          <body>
            <header>
              <h1>HitaVirTech Codelabs</h1>
              <p>Hands-on Data Engineering Labs &mdash; Batch 5 &bull; April 2026</p>
            </header>
            <main id='codelabs-grid'></main>
            <footer>Built with Google Codelabs &bull; &copy; 2026 HitaVirTech</footer>
            <script>
              const codelabs = $CODELABS_JSON;
              const grid = document.getElementById('codelabs-grid');
              codelabs.forEach(c => {
                grid.innerHTML += '<div class="card"><span class="badge">Data Engineering</span><h3>' + c.title + '</h3><a href="' + c.id + '/">Start Lab &rarr;</a></div>';
              });
              if (!codelabs.length) grid.innerHTML = '<p style="padding:2rem">No codelabs found yet. Push a .md codelab file to get started!</p>';
            </script>
          </body>
          </html>
          HTMLEOF
          echo '✅ Landing page generated'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  # ── JOB 3: Deploy to GitHub Pages ─────────────
  deploy:
    name: '🚀 Deploy to GitHub Pages'
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment Summary
        run: |
          echo '## 🚀 Deployment Complete' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo "**Live URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'Your codelabs are live on GitHub Pages! 🎉' >> $GITHUB_STEP_SUMMARY
