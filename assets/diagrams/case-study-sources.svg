<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360">
  <defs>
    <style>
      text { font-family: "Google Sans", "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="780" height="360" rx="12" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#202124">Insurance Claims -- Source Systems and Data Flow</text>

  <!-- Source Systems subtitle -->
  <text x="390" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#5f6368">Source Systems</text>

  <!-- Source Systems Table Headers -->
  <rect x="20" y="60" width="240" height="26" rx="4" fill="#dadce0"/>
  <text x="140" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#3c4043">Source System</text>
  <rect x="264" y="60" width="240" height="26" rx="4" fill="#dadce0"/>
  <text x="384" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#3c4043">Technology</text>
  <rect x="508" y="60" width="252" height="26" rx="4" fill="#dadce0"/>
  <text x="634" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#3c4043">Data</text>

  <!-- Source Row 1 (tinted) -->
  <rect x="20" y="90" width="240" height="28" rx="4" fill="#e8eaed"/>
  <rect x="264" y="90" width="240" height="28" rx="4" fill="#e8eaed"/>
  <rect x="508" y="90" width="252" height="28" rx="4" fill="#e8eaed"/>
  <text x="140" y="109" text-anchor="middle" font-size="12" fill="#3c4043">Policy Admin</text>
  <text x="384" y="109" text-anchor="middle" font-size="12" fill="#3c4043">Oracle DB</text>
  <text x="634" y="109" text-anchor="middle" font-size="12" fill="#3c4043">Policies, premiums, coverage</text>

  <!-- Source Row 2 (white) -->
  <rect x="20" y="122" width="240" height="28" rx="4" fill="#ffffff"/>
  <rect x="264" y="122" width="240" height="28" rx="4" fill="#ffffff"/>
  <rect x="508" y="122" width="252" height="28" rx="4" fill="#ffffff"/>
  <text x="140" y="141" text-anchor="middle" font-size="12" fill="#3c4043">Claims System</text>
  <text x="384" y="141" text-anchor="middle" font-size="12" fill="#3c4043">SQL Server</text>
  <text x="634" y="141" text-anchor="middle" font-size="12" fill="#3c4043">Claims, assessments, payments</text>

  <!-- Source Row 3 (tinted) -->
  <rect x="20" y="154" width="240" height="28" rx="4" fill="#e8eaed"/>
  <rect x="264" y="154" width="240" height="28" rx="4" fill="#e8eaed"/>
  <rect x="508" y="154" width="252" height="28" rx="4" fill="#e8eaed"/>
  <text x="140" y="173" text-anchor="middle" font-size="12" fill="#3c4043">Customer CRM</text>
  <text x="384" y="173" text-anchor="middle" font-size="12" fill="#3c4043">Salesforce</text>
  <text x="634" y="173" text-anchor="middle" font-size="12" fill="#3c4043">Customer profiles, contacts</text>

  <!-- Separator -->
  <line x1="40" y1="196" x2="740" y2="196" stroke="#dadce0" stroke-width="2"/>

  <!-- Medallion Flow subtitle -->
  <text x="390" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#5f6368">Medallion Flow</text>

  <!-- Medallion Table Headers -->
  <rect x="20" y="226" width="240" height="26" rx="4" fill="#dadce0"/>
  <text x="140" y="244" text-anchor="middle" font-size="12" font-weight="bold" fill="#3c4043">Layer</text>
  <rect x="264" y="226" width="496" height="26" rx="4" fill="#dadce0"/>
  <text x="512" y="244" text-anchor="middle" font-size="12" font-weight="bold" fill="#3c4043">What Happens</text>

  <!-- Medallion Row 1 -->
  <rect x="20" y="256" width="240" height="28" rx="4" fill="#eceff1"/>
  <rect x="264" y="256" width="496" height="28" rx="4" fill="#eceff1"/>
  <text x="140" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#78909c">Bronze (Raw Ingestion)</text>
  <text x="512" y="275" text-anchor="middle" font-size="12" fill="#3c4043">All three sources land as raw tables</text>

  <!-- Medallion Row 2 -->
  <rect x="20" y="288" width="240" height="28" rx="4" fill="#ffffff"/>
  <rect x="264" y="288" width="496" height="28" rx="4" fill="#ffffff"/>
  <text x="140" y="307" text-anchor="middle" font-size="12" font-weight="bold" fill="#607d8b">Silver (Cleansed)</text>
  <text x="512" y="307" text-anchor="middle" font-size="12" fill="#3c4043">Cleaned, validated, deduplicated, standardized</text>

  <!-- Medallion Row 3 (Gold) -->
  <rect x="20" y="320" width="240" height="28" rx="4" fill="#fff8e1"/>
  <rect x="264" y="320" width="496" height="28" rx="4" fill="#fff8e1"/>
  <text x="140" y="339" text-anchor="middle" font-size="12" font-weight="bold" fill="#f9a825">Gold (Star Schemas)</text>
  <text x="512" y="339" text-anchor="middle" font-size="12" fill="#3c4043">Fact and dimension tables for analytics</text>
</svg>