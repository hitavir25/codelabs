<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 300" font-family="Google Sans, Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="s" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="780" height="300" rx="12" fill="#f8f9fa"/>
  <text x="390" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#5f6368">SCD TYPE 2 — Customer Moves from Mumbai to Pune</text>

  <!-- BEFORE -->
  <text x="45" y="60" font-size="12" font-weight="600" fill="#1a73e8">BEFORE (one row):</text>
  <rect x="40" y="70" width="700" height="40" rx="6" fill="white" stroke="#dadce0" filter="url(#s)"/>
  <text x="60" y="85" font-size="10" font-weight="600" fill="#5f6368">key</text>
  <text x="110" y="85" font-size="10" font-weight="600" fill="#5f6368">cust_id</text>
  <text x="190" y="85" font-size="10" font-weight="600" fill="#5f6368">city</text>
  <text x="310" y="85" font-size="10" font-weight="600" fill="#5f6368">effective</text>
  <text x="430" y="85" font-size="10" font-weight="600" fill="#5f6368">expiry</text>
  <text x="560" y="85" font-size="10" font-weight="600" fill="#5f6368">is_current</text>
  <text x="60" y="102" font-size="11" fill="#3c4043">1</text>
  <text x="110" y="102" font-size="11" fill="#3c4043">C001</text>
  <rect x="180" y="92" width="80" height="18" rx="4" fill="#e8f0fe"/>
  <text x="190" y="105" font-size="11" font-weight="600" fill="#1a73e8">Mumbai</text>
  <text x="310" y="102" font-size="11" fill="#3c4043">2025-01-01</text>
  <text x="430" y="102" font-size="11" fill="#3c4043">9999-12-31</text>
  <rect x="550" y="92" width="60" height="18" rx="4" fill="#e6f4ea"/>
  <text x="560" y="105" font-size="11" font-weight="600" fill="#34a853">TRUE</text>

  <!-- Arrow -->
  <text x="390" y="140" text-anchor="middle" font-size="22" fill="#ea8600">&#x2193;</text>
  <text x="390" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#ea8600">Customer moves to Pune</text>

  <!-- AFTER -->
  <text x="45" y="185" font-size="12" font-weight="600" fill="#34a853">AFTER (two rows — full history preserved):</text>

  <!-- Row 1 (expired) -->
  <rect x="40" y="195" width="700" height="40" rx="6" fill="white" stroke="#dadce0" filter="url(#s)"/>
  <text x="60" y="210" font-size="10" font-weight="600" fill="#5f6368">key</text>
  <text x="110" y="210" font-size="10" font-weight="600" fill="#5f6368">cust_id</text>
  <text x="190" y="210" font-size="10" font-weight="600" fill="#5f6368">city</text>
  <text x="310" y="210" font-size="10" font-weight="600" fill="#5f6368">effective</text>
  <text x="430" y="210" font-size="10" font-weight="600" fill="#5f6368">expiry</text>
  <text x="560" y="210" font-size="10" font-weight="600" fill="#5f6368">is_current</text>
  <text x="60" y="228" font-size="11" fill="#9aa0a6">1</text>
  <text x="110" y="228" font-size="11" fill="#9aa0a6">C001</text>
  <text x="190" y="228" font-size="11" fill="#9aa0a6">Mumbai</text>
  <text x="310" y="228" font-size="11" fill="#9aa0a6">2025-01-01</text>
  <text x="430" y="228" font-size="11" fill="#d93025">2026-03-14</text>
  <rect x="550" y="218" width="60" height="18" rx="4" fill="#fce8e6"/>
  <text x="560" y="231" font-size="11" font-weight="600" fill="#d93025">FALSE</text>
  <text x="680" y="228" font-size="10" fill="#9aa0a6">expired</text>

  <!-- Row 2 (current) -->
  <rect x="40" y="240" width="700" height="32" rx="6" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5" filter="url(#s)"/>
  <text x="60" y="262" font-size="11" font-weight="600" fill="#3c4043">4</text>
  <text x="110" y="262" font-size="11" fill="#3c4043">C001</text>
  <rect x="180" y="250" width="60" height="18" rx="4" fill="#34a853"/>
  <text x="190" y="263" font-size="11" font-weight="600" fill="white">Pune</text>
  <text x="310" y="262" font-size="11" fill="#3c4043">2026-03-15</text>
  <text x="430" y="262" font-size="11" fill="#3c4043">9999-12-31</text>
  <rect x="550" y="250" width="60" height="18" rx="4" fill="#34a853"/>
  <text x="560" y="263" font-size="11" font-weight="600" fill="white">TRUE</text>
  <text x="680" y="262" font-size="10" font-weight="600" fill="#34a853">current</text>

  <text x="390" y="292" text-anchor="middle" font-size="10" fill="#9aa0a6">HitaVir Tech — SCD Type 2 preserves full history</text>
</svg>
