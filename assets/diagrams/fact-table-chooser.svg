<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 230" font-family="Google Sans, Segoe UI, Arial, sans-serif">
  <rect width="780" height="230" rx="12" fill="#f8f9fa"/>
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#202124">Choosing the Right Fact Table</text>

  <rect x="15" y="44" width="200" height="34" rx="6" fill="#5f6368"/>
  <text x="115" y="66" text-anchor="middle" font-size="13" font-weight="700" fill="white">Question</text>
  <rect x="220" y="44" width="175" height="34" rx="6" fill="#1a73e8"/>
  <text x="307" y="66" text-anchor="middle" font-size="13" font-weight="700" fill="white">Transaction</text>
  <rect x="400" y="44" width="185" height="34" rx="6" fill="#ea8600"/>
  <text x="492" y="66" text-anchor="middle" font-size="13" font-weight="700" fill="white">Periodic Snapshot</text>
  <rect x="590" y="44" width="175" height="34" rx="6" fill="#34a853"/>
  <text x="677" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="white">Accumulating Snap.</text>

  <rect x="15" y="84" width="200" height="32" rx="4" fill="#e8eaed"/>
  <text x="28" y="105" font-size="12" font-weight="600" fill="#202124">Rows per entity?</text>
  <rect x="220" y="84" width="175" height="32" rx="4" fill="#e8f0fe"/>
  <text x="307" y="105" text-anchor="middle" font-size="12" fill="#1a73e8">Many (one per event)</text>
  <rect x="400" y="84" width="185" height="32" rx="4" fill="#fef7e0"/>
  <text x="492" y="105" text-anchor="middle" font-size="12" fill="#ea8600">One per period</text>
  <rect x="590" y="84" width="175" height="32" rx="4" fill="#e6f4ea"/>
  <text x="677" y="105" text-anchor="middle" font-size="12" fill="#34a853">One per lifecycle</text>

  <rect x="15" y="120" width="200" height="32" rx="4" fill="white"/>
  <text x="28" y="141" font-size="12" font-weight="600" fill="#202124">Row updated?</text>
  <rect x="220" y="120" width="175" height="32" rx="4" fill="white"/>
  <text x="307" y="141" text-anchor="middle" font-size="12" fill="#3c4043">Never</text>
  <rect x="400" y="120" width="185" height="32" rx="4" fill="white"/>
  <text x="492" y="141" text-anchor="middle" font-size="12" fill="#3c4043">Replaced each period</text>
  <rect x="590" y="120" width="175" height="32" rx="4" fill="white"/>
  <text x="677" y="141" text-anchor="middle" font-size="12" fill="#3c4043">Updated at milestones</text>

  <rect x="15" y="156" width="200" height="32" rx="4" fill="#e8eaed"/>
  <text x="28" y="177" font-size="12" font-weight="600" fill="#202124">Tracks events?</text>
  <rect x="220" y="156" width="175" height="32" rx="4" fill="#e8f0fe"/>
  <text x="307" y="177" text-anchor="middle" font-size="12" font-weight="600" fill="#1a73e8">Yes</text>
  <rect x="400" y="156" width="185" height="32" rx="4" fill="#fef7e0"/>
  <text x="492" y="177" text-anchor="middle" font-size="12" fill="#ea8600">No (aggregated)</text>
  <rect x="590" y="156" width="175" height="32" rx="4" fill="#e6f4ea"/>
  <text x="677" y="177" text-anchor="middle" font-size="12" fill="#34a853">Yes (lifecycle)</text>

  <rect x="15" y="192" width="200" height="32" rx="4" fill="white"/>
  <text x="28" y="213" font-size="12" font-weight="600" fill="#202124">Time span per row</text>
  <rect x="220" y="192" width="175" height="32" rx="4" fill="white"/>
  <text x="307" y="213" text-anchor="middle" font-size="12" fill="#3c4043">Point in time</text>
  <rect x="400" y="192" width="185" height="32" rx="4" fill="white"/>
  <text x="492" y="213" text-anchor="middle" font-size="12" fill="#3c4043">Fixed period</text>
  <rect x="590" y="192" width="175" height="32" rx="4" fill="white"/>
  <text x="677" y="213" text-anchor="middle" font-size="12" fill="#3c4043">Variable duration</text>
</svg>
