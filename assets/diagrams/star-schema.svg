<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Google Sans, Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="s" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="800" height="520" rx="12" fill="#f8f9fa"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#5f6368">STAR SCHEMA — Retail Sales Example</text>

  <!-- Center: Fact Table -->
  <rect x="260" y="170" width="280" height="200" rx="10" fill="#1a73e8" filter="url(#s)"/>
  <text x="400" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="white">fact_sales</text>
  <line x1="280" y1="204" x2="520" y2="204" stroke="#4d9ef5" stroke-width="1"/>
  <text x="290" y="224" font-size="11" fill="#c2d9f7">FK  customer_key</text>
  <text x="290" y="242" font-size="11" fill="#c2d9f7">FK  product_key</text>
  <text x="290" y="260" font-size="11" fill="#c2d9f7">FK  store_key</text>
  <text x="290" y="278" font-size="11" fill="#c2d9f7">FK  date_key</text>
  <line x1="280" y1="286" x2="520" y2="286" stroke="#4d9ef5" stroke-width="1" stroke-dasharray="3"/>
  <text x="290" y="304" font-size="11" fill="white">quantity</text>
  <text x="290" y="322" font-size="11" fill="white">unit_price</text>
  <text x="290" y="340" font-size="11" fill="white">total_amount</text>
  <text x="290" y="358" font-size="11" fill="white">profit</text>

  <!-- Top: dim_customer -->
  <rect x="270" y="30" width="260" height="110" rx="8" fill="#34a853" filter="url(#s)"/>
  <text x="400" y="54" text-anchor="middle" font-size="13" font-weight="700" fill="white">dim_customer</text>
  <line x1="288" y1="62" x2="512" y2="62" stroke="#5ec97a" stroke-width="1"/>
  <text x="288" y="80" font-size="11" fill="#b8e6c4">PK  customer_key</text>
  <text x="288" y="96" font-size="11" fill="white">customer_name, segment</text>
  <text x="288" y="112" font-size="11" fill="white">city, state, country</text>
  <text x="288" y="128" font-size="11" fill="#b8e6c4">effective_date, is_current</text>
  <!-- Line to fact -->
  <line x1="400" y1="140" x2="400" y2="170" stroke="#9aa0a6" stroke-width="2"/>

  <!-- Left: dim_product -->
  <rect x="20" y="195" width="210" height="110" rx="8" fill="#ea8600" filter="url(#s)"/>
  <text x="125" y="219" text-anchor="middle" font-size="13" font-weight="700" fill="white">dim_product</text>
  <line x1="38" y1="227" x2="212" y2="227" stroke="#f5b84d" stroke-width="1"/>
  <text x="38" y="245" font-size="11" fill="#fce4b8">PK  product_key</text>
  <text x="38" y="261" font-size="11" fill="white">product_name</text>
  <text x="38" y="277" font-size="11" fill="white">category, brand</text>
  <text x="38" y="293" font-size="11" fill="white">unit_cost, unit_price</text>
  <!-- Line to fact -->
  <line x1="230" y1="250" x2="260" y2="250" stroke="#9aa0a6" stroke-width="2"/>

  <!-- Right: dim_store -->
  <rect x="570" y="195" width="210" height="110" rx="8" fill="#7c3aed" filter="url(#s)"/>
  <text x="675" y="219" text-anchor="middle" font-size="13" font-weight="700" fill="white">dim_store</text>
  <line x1="588" y1="227" x2="762" y2="227" stroke="#a78bfa" stroke-width="1"/>
  <text x="588" y="245" font-size="11" fill="#d4bffc">PK  store_key</text>
  <text x="588" y="261" font-size="11" fill="white">store_name, store_type</text>
  <text x="588" y="277" font-size="11" fill="white">region, state, city</text>
  <text x="588" y="293" font-size="11" fill="white">manager_name</text>
  <!-- Line to fact -->
  <line x1="540" y1="250" x2="570" y2="250" stroke="#9aa0a6" stroke-width="2"/>

  <!-- Bottom: dim_date -->
  <rect x="270" y="400" width="260" height="100" rx="8" fill="#d93025" filter="url(#s)"/>
  <text x="400" y="424" text-anchor="middle" font-size="13" font-weight="700" fill="white">dim_date</text>
  <line x1="288" y1="432" x2="512" y2="432" stroke="#f28b82" stroke-width="1"/>
  <text x="288" y="450" font-size="11" fill="#fad2cf">PK  date_key</text>
  <text x="288" y="466" font-size="11" fill="white">full_date, day_name</text>
  <text x="288" y="482" font-size="11" fill="white">month, quarter, year</text>
  <text x="288" y="498" font-size="11" fill="white">is_weekend, is_holiday</text>
  <!-- Line to fact -->
  <line x1="400" y1="370" x2="400" y2="400" stroke="#9aa0a6" stroke-width="2"/>

  <text x="400" y="515" text-anchor="middle" font-size="10" fill="#9aa0a6">HitaVir Tech - Star Schema</text>
</svg>
