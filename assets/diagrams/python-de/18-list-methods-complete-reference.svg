  <text x="553" y="126" font-size="12" fill="#3c4043">Yes</text>
  <rect x="15" y="140" width="145" height="28" rx="4" fill="#e8f0fe"/>
  <text x="25" y="158" font-size="12" font-weight="700" font-family="monospace" fill="#1a73e8">insert(i, x)</text>
  <rect x="165" y="140" width="291" height="28" rx="4" fill="#e8f0fe"/>
