  <text x="25" y="94" font-size="12" font-weight="700" font-family="monospace" fill="#1a73e8">append(x)</text>
  <rect x="165" y="76" width="291" height="28" rx="4" fill="#e8f0fe"/>
  <text x="175" y="94" font-size="12" fill="#1a73e8">Add one item to the end</text>
  <rect x="461" y="76" width="77" height="28" rx="4" fill="#e8f0fe"/>
  <text x="471" y="94" font-size="12" font-family="monospace" fill="#1a73e8">None</text>
  <rect x="543" y="76" width="83" height="28" rx="4" fill="#e8f0fe"/>
  <text x="553" y="94" font-size="12" fill="#1a73e8">Yes</text>
  <rect x="15" y="108" width="145" height="28" rx="4" fill="white"/>
  <text x="25" y="126" font-size="12" font-weight="700" font-family="monospace" fill="#3c4043">extend(iterable)</text>
  <rect x="165" y="108" width="291" height="28" rx="4" fill="white"/>
