  <rect x="461" y="236" width="77" height="28" rx="4" fill="white"/>
  <text x="471" y="254" font-size="12" font-family="monospace" fill="#3c4043">None</text>
  <rect x="543" y="236" width="83" height="28" rx="4" fill="white"/>
  <text x="553" y="254" font-size="12" fill="#3c4043">Yes</text>
  <rect x="15" y="268" width="145" height="28" rx="4" fill="#e8f0fe"/>
