  <rect x="461" y="140" width="77" height="28" rx="4" fill="#e8f0fe"/>
  <text x="471" y="158" font-size="12" font-family="monospace" fill="#1a73e8">None</text>
  <rect x="543" y="140" width="83" height="28" rx="4" fill="#e8f0fe"/>
  <text x="553" y="158" font-size="12" fill="#1a73e8">Yes</text>
  <rect x="15" y="172" width="145" height="28" rx="4" fill="white"/>
  <text x="25" y="190" font-size="12" font-weight="700" font-family="monospace" fill="#3c4043">remove(x)</text>
  <rect x="165" y="172" width="291" height="28" rx="4" fill="white"/>
