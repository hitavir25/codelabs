  <rect x="165" y="268" width="291" height="28" rx="4" fill="#e8f0fe"/>
  <text x="175" y="286" font-size="12" fill="#1a73e8">Index of the first item equal to x</text>
  <rect x="461" y="268" width="77" height="28" rx="4" fill="#e8f0fe"/>
  <text x="471" y="286" font-size="12" font-family="monospace" fill="#1a73e8">int</text>
  <rect x="543" y="268" width="83" height="28" rx="4" fill="#e8f0fe"/>
  <text x="553" y="286" font-size="12" fill="#1a73e8">No</text>
  <rect x="15" y="300" width="145" height="28" rx="4" fill="white"/>
  <text x="25" y="318" font-size="12" font-weight="700" font-family="monospace" fill="#3c4043">count(x)</text>
  <rect x="165" y="300" width="291" height="28" rx="4" fill="white"/>
  <text x="175" y="318" font-size="12" fill="#3c4043">Number of times x appears</text>
  <rect x="461" y="300" width="77" height="28" rx="4" fill="white"/>
  <text x="471" y="318" font-size="12" font-family="monospace" fill="#3c4043">int</text>
  <rect x="543" y="300" width="83" height="28" rx="4" fill="white"/>
  <text x="553" y="318" font-size="12" fill="#3c4043">No</text>
  <rect x="15" y="332" width="145" height="28" rx="4" fill="#e8f0fe"/>
  <text x="25" y="350" font-size="12" font-weight="700" font-family="monospace" fill="#1a73e8">sort()</text>
  <rect x="165" y="332" width="291" height="28" rx="4" fill="#e8f0fe"/>
  <text x="175" y="350" font-size="12" fill="#1a73e8">Sort the list in place</text>
  <rect x="461" y="332" width="77" height="28" rx="4" fill="#e8f0fe"/>
  <text x="471" y="350" font-size="12" font-family="monospace" fill="#1a73e8">None</text>
  <rect x="543" y="332" width="83" height="28" rx="4" fill="#e8f0fe"/>
  <text x="553" y="350" font-size="12" fill="#1a73e8">Yes</text>
  <rect x="15" y="364" width="145" height="28" rx="4" fill="white"/>
  <text x="25" y="382" font-size="12" font-weight="700" font-family="monospace" fill="#3c4043">reverse()</text>
  <rect x="165" y="364" width="291" height="28" rx="4" fill="white"/>
  <text x="175" y="382" font-size="12" fill="#3c4043">Reverse the list in place</text>
  <rect x="461" y="364" width="77" height="28" rx="4" fill="white"/>
  <text x="471" y="382" font-size="12" font-family="monospace" fill="#3c4043">None</text>
  <rect x="543" y="364" width="83" height="28" rx="4" fill="white"/>
  <text x="553" y="382" font-size="12" fill="#3c4043">Yes</text>
  <rect x="15" y="396" width="145" height="28" rx="4" fill="#e8f0fe"/>
  <text x="25" y="414" font-size="12" font-weight="700" font-family="monospace" fill="#1a73e8">copy()</text>
  <rect x="165" y="396" width="291" height="28" rx="4" fill="#e8f0fe"/>
  <text x="175" y="414" font-size="12" fill="#1a73e8">Return a shallow copy</text>
  <rect x="461" y="396" width="77" height="28" rx="4" fill="#e8f0fe"/>
