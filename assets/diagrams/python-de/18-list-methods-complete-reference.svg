<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 641 450" font-family="Google Sans, Segoe UI, Arial, sans-serif">
  <rect width="641" height="450" rx="12" fill="#f8f9fa"/>
  <text x="320" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">List Methods — Complete Reference</text>
  <rect x="15" y="40" width="145" height="30" rx="6" fill="#1a73e8"/>
  <text x="87" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="white">Method</text>
