<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 786 362" font-family="Google Sans, Segoe UI, Arial, sans-serif">
  <rect width="786" height="362" rx="12" fill="#f8f9fa"/>
  <text x="393" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">CSV vs JSON vs Parquet</text>
  <rect x="15" y="44" width="152" height="30" rx="6" fill="#5f6368"/>
  <text x="91" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="white">Feature</text>
  <rect x="173" y="44" width="140" height="30" rx="6" fill="#1a73e8"/>
  <text x="243" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="white">CSV</text>
  <rect x="319" y="44" width="234" height="30" rx="6" fill="#ea8600"/>
  <text x="436" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="white">JSON</text>
  <rect x="559" y="44" width="212" height="30" rx="6" fill="#1e8e3e"/>
  <text x="665" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="white">Parquet</text>
  <rect x="15" y="80" width="152" height="28" rx="4" fill="#f1f3f4"/>
  <text x="25" y="98" font-size="12" font-weight="600" fill="#3c4043">Layout</text>
  <rect x="173" y="80" width="140" height="28" rx="4" fill="#e8f0fe"/>
  <text x="183" y="98" font-size="11" fill="#1967d2">row by row</text>
  <rect x="319" y="80" width="234" height="28" rx="4" fill="#fef0e3"/>
  <text x="329" y="98" font-size="11" fill="#b45309">records / nested objects</text>
  <rect x="559" y="80" width="212" height="28" rx="4" fill="#e6f4ea"/>
  <text x="569" y="98" font-size="11" fill="#137333">column by column</text>
  <rect x="15" y="112" width="152" height="28" rx="4" fill="#f1f3f4"/>
  <text x="25" y="130" font-size="12" font-weight="600" fill="#3c4043">Stored as</text>
  <rect x="173" y="112" width="140" height="28" rx="4" fill="#e8f0fe"/>
  <text x="183" y="130" font-size="11" fill="#1967d2">plain text</text>
  <rect x="319" y="112" width="234" height="28" rx="4" fill="#fef0e3"/>
  <text x="329" y="130" font-size="11" fill="#b45309">plain text</text>
  <rect x="559" y="112" width="212" height="28" rx="4" fill="#e6f4ea"/>
  <text x="569" y="130" font-size="11" fill="#137333">compressed binary</text>
  <rect x="15" y="144" width="152" height="28" rx="4" fill="#f1f3f4"/>
  <text x="25" y="162" font-size="12" font-weight="600" fill="#3c4043">Size (large data)</text>
  <rect x="173" y="144" width="140" height="28" rx="4" fill="#e8f0fe"/>
  <text x="183" y="162" font-size="11" fill="#1967d2">large</text>
  <rect x="319" y="144" width="234" height="28" rx="4" fill="#fef0e3"/>
  <text x="329" y="162" font-size="11" fill="#b45309">largest (keys repeat every row)</text>
  <rect x="559" y="144" width="212" height="28" rx="4" fill="#e6f4ea"/>
  <text x="569" y="162" font-size="11" fill="#137333">smallest (~5–10× &lt; CSV)</text>
  <rect x="15" y="176" width="152" height="28" rx="4" fill="#f1f3f4"/>
  <text x="25" y="194" font-size="12" font-weight="600" fill="#3c4043">Remembers data types</text>
  <rect x="173" y="176" width="140" height="28" rx="4" fill="#e8f0fe"/>
  <text x="183" y="194" font-size="11" fill="#1967d2">no (all text)</text>
  <rect x="319" y="176" width="234" height="28" rx="4" fill="#fef0e3"/>
  <text x="329" y="194" font-size="11" fill="#b45309">some (number, bool, null)</text>
  <rect x="559" y="176" width="212" height="28" rx="4" fill="#e6f4ea"/>
  <text x="569" y="194" font-size="11" fill="#137333">yes (full types)</text>
  <rect x="15" y="208" width="152" height="28" rx="4" fill="#f1f3f4"/>
  <text x="25" y="226" font-size="12" font-weight="600" fill="#3c4043">Nested data</text>
  <rect x="173" y="208" width="140" height="28" rx="4" fill="#e8f0fe"/>
  <text x="183" y="226" font-size="11" fill="#1967d2">no</text>
  <rect x="319" y="208" width="234" height="28" rx="4" fill="#fef0e3"/>
  <text x="329" y="226" font-size="11" fill="#b45309">yes</text>
  <rect x="559" y="208" width="212" height="28" rx="4" fill="#e6f4ea"/>
  <text x="569" y="226" font-size="11" fill="#137333">yes</text>
  <rect x="15" y="240" width="152" height="28" rx="4" fill="#f1f3f4"/>
  <text x="25" y="258" font-size="12" font-weight="600" fill="#3c4043">Read just one column</text>
  <rect x="173" y="240" width="140" height="28" rx="4" fill="#e8f0fe"/>
  <text x="183" y="258" font-size="11" fill="#1967d2">reads whole file</text>
  <rect x="319" y="240" width="234" height="28" rx="4" fill="#fef0e3"/>
  <text x="329" y="258" font-size="11" fill="#b45309">reads whole file</text>
  <rect x="559" y="240" width="212" height="28" rx="4" fill="#e6f4ea"/>
  <text x="569" y="258" font-size="11" fill="#137333">reads only that column</text>
  <rect x="15" y="272" width="152" height="28" rx="4" fill="#f1f3f4"/>
  <text x="25" y="290" font-size="12" font-weight="600" fill="#3c4043">Human-readable</text>
  <rect x="173" y="272" width="140" height="28" rx="4" fill="#e8f0fe"/>
  <text x="183" y="290" font-size="11" fill="#1967d2">yes</text>
  <rect x="319" y="272" width="234" height="28" rx="4" fill="#fef0e3"/>
  <text x="329" y="290" font-size="11" fill="#b45309">yes</text>
  <rect x="559" y="272" width="212" height="28" rx="4" fill="#e6f4ea"/>
  <text x="569" y="290" font-size="11" fill="#137333">no (needs code)</text>
  <rect x="15" y="304" width="152" height="28" rx="4" fill="#f1f3f4"/>
  <text x="25" y="322" font-size="12" font-weight="600" fill="#3c4043">Best for</text>
  <rect x="173" y="304" width="140" height="28" rx="4" fill="#e8f0fe"/>
  <text x="183" y="322" font-size="11" fill="#1967d2">spreadsheets, exchange</text>
  <rect x="319" y="304" width="234" height="28" rx="4" fill="#fef0e3"/>
  <text x="329" y="322" font-size="11" fill="#b45309">APIs, configs, nested data</text>
  <rect x="559" y="304" width="212" height="28" rx="4" fill="#e6f4ea"/>
  <text x="569" y="322" font-size="11" fill="#137333">analytics, data lakes</text>
  <text x="393" y="350" text-anchor="middle" font-size="10" fill="#9aa0a6">HitaVir Tech</text>
</svg>
