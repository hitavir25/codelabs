<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 649 482" font-family="Google Sans, Segoe UI, Arial, sans-serif">
  <rect width="649" height="482" rx="12" fill="#f8f9fa"/>
  <text x="324" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">Types of Functions in Python</text>
  <rect x="15" y="40" width="167" height="30" rx="6" fill="#1a73e8"/>
  <text x="98" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="white">Type</text>
  <rect x="187" y="40" width="229" height="30" rx="6" fill="#1a73e8"/>
  <text x="302" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="white">Description</text>
  <rect x="422" y="40" width="212" height="30" rx="6" fill="#1a73e8"/>
  <text x="528" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="white">Example</text>
  <rect x="15" y="76" width="167" height="28" rx="4" fill="#e8f0fe"/>
  <text x="25" y="94" font-size="12" font-weight="700" fill="#1a73e8">Basic function</text>
  <rect x="187" y="76" width="229" height="28" rx="4" fill="#e8f0fe"/>
  <text x="197" y="94" font-size="12" fill="#1a73e8">No parameters, no return</text>
  <rect x="422" y="76" width="212" height="28" rx="4" fill="#e8f0fe"/>
  <text x="432" y="94" font-size="12" font-family="monospace" fill="#1a73e8">def greet():</text>
  <rect x="15" y="108" width="167" height="28" rx="4" fill="white"/>
  <text x="25" y="126" font-size="12" font-weight="700" fill="#3c4043">Parameterized function</text>
  <rect x="187" y="108" width="229" height="28" rx="4" fill="white"/>
  <text x="197" y="126" font-size="12" fill="#3c4043">Accepts inputs</text>
  <rect x="422" y="108" width="212" height="28" rx="4" fill="white"/>
  <text x="432" y="126" font-size="12" font-family="monospace" fill="#3c4043">def add(a, b):</text>
  <rect x="15" y="140" width="167" height="28" rx="4" fill="#e8f0fe"/>
  <text x="25" y="158" font-size="12" font-weight="700" fill="#1a73e8">Function with return</text>
  <rect x="187" y="140" width="229" height="28" rx="4" fill="#e8f0fe"/>
  <text x="197" y="158" font-size="12" fill="#1a73e8">Sends back a result</text>
  <rect x="422" y="140" width="212" height="28" rx="4" fill="#e8f0fe"/>
  <text x="432" y="158" font-size="12" font-family="monospace" fill="#1a73e8">return a + b</text>
  <rect x="15" y="172" width="167" height="28" rx="4" fill="white"/>
  <text x="25" y="190" font-size="12" font-weight="700" fill="#3c4043">Default parameters</text>
  <rect x="187" y="172" width="229" height="28" rx="4" fill="white"/>
  <text x="197" y="190" font-size="12" fill="#3c4043">Parameters with fallback values</text>
  <rect x="422" y="172" width="212" height="28" rx="4" fill="white"/>
  <text x="432" y="190" font-size="12" font-family="monospace" fill="#3c4043">def connect(port=5432):</text>
  <rect x="15" y="204" width="167" height="28" rx="4" fill="#e8f0fe"/>
  <text x="25" y="222" font-size="12" font-weight="700" fill="#1a73e8">Keyword arguments</text>
  <rect x="187" y="204" width="229" height="28" rx="4" fill="#e8f0fe"/>
  <text x="197" y="222" font-size="12" fill="#1a73e8">Call by name</text>
  <rect x="422" y="204" width="212" height="28" rx="4" fill="#e8f0fe"/>
  <text x="432" y="222" font-size="12" font-family="monospace" fill="#1a73e8">connect(port=3306)</text>
  <rect x="15" y="236" width="167" height="28" rx="4" fill="white"/>
  <text x="25" y="254" font-size="12" font-weight="700" font-family="monospace" fill="#3c4043">*args</text>
  <rect x="187" y="236" width="229" height="28" rx="4" fill="white"/>
  <text x="197" y="254" font-size="12" fill="#3c4043">Variable number of positional args</text>
  <rect x="422" y="236" width="212" height="28" rx="4" fill="white"/>
  <text x="432" y="254" font-size="12" font-family="monospace" fill="#3c4043">def func(*args):</text>
  <rect x="15" y="268" width="167" height="28" rx="4" fill="#e8f0fe"/>
  <text x="25" y="286" font-size="12" font-weight="700" font-family="monospace" fill="#1a73e8">kwargs</text>
  <rect x="187" y="268" width="229" height="28" rx="4" fill="#e8f0fe"/>
  <text x="197" y="286" font-size="12" fill="#1a73e8">Variable number of keyword args</text>
  <rect x="422" y="268" width="212" height="28" rx="4" fill="#e8f0fe"/>
  <text x="432" y="286" font-size="12" font-family="monospace" fill="#1a73e8">def func(kwargs):</text>
  <rect x="15" y="300" width="167" height="28" rx="4" fill="white"/>
  <text x="25" y="318" font-size="12" font-weight="700" fill="#3c4043">Lambda function</text>
  <rect x="187" y="300" width="229" height="28" rx="4" fill="white"/>
  <text x="197" y="318" font-size="12" fill="#3c4043">One-line anonymous function</text>
  <rect x="422" y="300" width="212" height="28" rx="4" fill="white"/>
  <text x="432" y="318" font-size="12" font-family="monospace" fill="#3c4043">lambda x: x * 2</text>
  <rect x="15" y="332" width="167" height="28" rx="4" fill="#e8f0fe"/>
  <text x="25" y="350" font-size="12" font-weight="700" fill="#1a73e8">Nested function</text>
  <rect x="187" y="332" width="229" height="28" rx="4" fill="#e8f0fe"/>
  <text x="197" y="350" font-size="12" fill="#1a73e8">Function inside a function</text>
  <rect x="422" y="332" width="212" height="28" rx="4" fill="#e8f0fe"/>
  <text x="432" y="350" font-size="12" font-family="monospace" fill="#1a73e8">def outer(): def inner():</text>
  <rect x="15" y="364" width="167" height="28" rx="4" fill="white"/>
  <text x="25" y="382" font-size="12" font-weight="700" fill="#3c4043">Recursive function</text>
  <rect x="187" y="364" width="229" height="28" rx="4" fill="white"/>
  <text x="197" y="382" font-size="12" fill="#3c4043">Function that calls itself</text>
  <rect x="422" y="364" width="212" height="28" rx="4" fill="white"/>
  <text x="432" y="382" font-size="12" font-family="monospace" fill="#3c4043">def factorial(n):</text>
  <rect x="15" y="396" width="167" height="28" rx="4" fill="#e8f0fe"/>
  <text x="25" y="414" font-size="12" font-weight="700" fill="#1a73e8">Generator function</text>
  <rect x="187" y="396" width="229" height="28" rx="4" fill="#e8f0fe"/>
  <text x="197" y="414" font-size="12" fill="#1a73e8">Yields values lazily</text>
  <rect x="422" y="396" width="212" height="28" rx="4" fill="#e8f0fe"/>
  <text x="432" y="414" font-size="12" font-family="monospace" fill="#1a73e8">def gen(): yield value</text>
  <rect x="15" y="428" width="167" height="28" rx="4" fill="white"/>
  <text x="25" y="446" font-size="12" font-weight="700" fill="#3c4043">Decorator function</text>
  <rect x="187" y="428" width="229" height="28" rx="4" fill="white"/>
  <text x="197" y="446" font-size="12" fill="#3c4043">Wraps another function</text>
  <rect x="422" y="428" width="212" height="28" rx="4" fill="white"/>
  <text x="432" y="446" font-size="12" font-family="monospace" fill="#3c4043">@decorator</text>
  <text x="324" y="476" text-anchor="middle" font-size="10" fill="#9aa0a6">HitaVir Tech</text>
</svg>
