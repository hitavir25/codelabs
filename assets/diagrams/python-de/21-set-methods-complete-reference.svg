  <rect x="217" y="108" width="265" height="28" rx="4" fill="white"/>
  <text x="227" y="126" font-size="12" fill="#3c4043">Add many elements</text>
  <rect x="488" y="108" width="97" height="28" rx="4" fill="white"/>
  <text x="498" y="126" font-size="12" font-family="monospace" fill="#3c4043">None</text>
  <rect x="15" y="140" width="197" height="28" rx="4" fill="#e8f0fe"/>
