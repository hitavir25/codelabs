  <rect x="488" y="332" width="97" height="28" rx="4" fill="#e8f0fe"/>
  <text x="498" y="350" font-size="12" fill="#1a73e8">new set</text>
  <rect x="15" y="364" width="197" height="28" rx="4" fill="white"/>
  <text x="25" y="382" font-size="12" font-weight="700" font-family="monospace" fill="#3c4043">difference(*s)</text>
  <rect x="217" y="364" width="265" height="28" rx="4" fill="white"/>
  <text x="227" y="382" font-size="12" fill="#3c4043">Items in this set only (operator: -)</text>
  <rect x="488" y="364" width="97" height="28" rx="4" fill="white"/>
  <text x="498" y="382" font-size="12" fill="#3c4043">new set</text>
  <rect x="15" y="396" width="197" height="28" rx="4" fill="#e8f0fe"/>
  <text x="25" y="414" font-size="12" font-weight="700" font-family="monospace" fill="#1a73e8">symmetric_difference(s)</text>
  <rect x="217" y="396" width="265" height="28" rx="4" fill="#e8f0fe"/>
  <text x="227" y="414" font-size="12" fill="#1a73e8">Items in exactly one set (operator: ^)</text>
  <rect x="488" y="396" width="97" height="28" rx="4" fill="#e8f0fe"/>
  <text x="498" y="414" font-size="12" fill="#1a73e8">new set</text>
  <rect x="15" y="428" width="197" height="28" rx="4" fill="white"/>
  <text x="25" y="446" font-size="12" font-weight="700" font-family="monospace" fill="#3c4043">issubset(s)</text>
  <rect x="217" y="428" width="265" height="28" rx="4" fill="white"/>
  <text x="227" y="446" font-size="12" fill="#3c4043">Is every item also in s?</text>
  <rect x="488" y="428" width="97" height="28" rx="4" fill="white"/>
  <text x="498" y="446" font-size="12" font-family="monospace" fill="#3c4043">bool</text>
  <rect x="15" y="460" width="197" height="28" rx="4" fill="#e8f0fe"/>
  <text x="25" y="478" font-size="12" font-weight="700" font-family="monospace" fill="#1a73e8">issuperset(s)</text>
  <rect x="217" y="460" width="265" height="28" rx="4" fill="#e8f0fe"/>
  <text x="227" y="478" font-size="12" fill="#1a73e8">Does this set contain all of s?</text>
  <rect x="488" y="460" width="97" height="28" rx="4" fill="#e8f0fe"/>
  <text x="498" y="478" font-size="12" font-family="monospace" fill="#1a73e8">bool</text>
  <rect x="15" y="492" width="197" height="28" rx="4" fill="white"/>
  <text x="25" y="510" font-size="12" font-weight="700" font-family="monospace" fill="#3c4043">isdisjoint(s)</text>
  <rect x="217" y="492" width="265" height="28" rx="4" fill="white"/>
  <text x="227" y="510" font-size="12" fill="#3c4043">Do the sets share nothing?</text>
  <rect x="488" y="492" width="97" height="28" rx="4" fill="white"/>
  <text x="498" y="510" font-size="12" font-family="monospace" fill="#3c4043">bool</text>
  <text x="300" y="540" text-anchor="middle" font-size="10" fill="#9aa0a6">HitaVir Tech</text>
