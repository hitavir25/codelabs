  <rect x="217" y="172" width="265" height="28" rx="4" fill="white"/>
  <text x="227" y="190" font-size="12" fill="#3c4043">Remove x if present (no error)</text>
  <rect x="488" y="172" width="97" height="28" rx="4" fill="white"/>
  <text x="498" y="190" font-size="12" font-family="monospace" fill="#3c4043">None</text>
  <rect x="15" y="204" width="197" height="28" rx="4" fill="#e8f0fe"/>
  <text x="25" y="222" font-size="12" font-weight="700" font-family="monospace" fill="#1a73e8">pop()</text>
  <rect x="217" y="204" width="265" height="28" rx="4" fill="#e8f0fe"/>
