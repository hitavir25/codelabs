  <rect x="488" y="300" width="97" height="28" rx="4" fill="white"/>
  <text x="498" y="318" font-size="12" fill="#3c4043">new set</text>
  <rect x="15" y="332" width="197" height="28" rx="4" fill="#e8f0fe"/>
