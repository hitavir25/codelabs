  <text x="25" y="126" font-size="12" font-weight="700" font-family="monospace" fill="#3c4043">"w"</text>
  <rect x="90" y="108" width="138" height="28" rx="4" fill="white"/>
  <text x="100" y="126" font-size="12" fill="#3c4043">Write (overwrites)</text>
  <rect x="233" y="108" width="230" height="28" rx="4" fill="white"/>
