  <text x="159" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="white">Meaning</text>
  <rect x="233" y="40" width="230" height="30" rx="6" fill="#1a73e8"/>
  <text x="348" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="white">Use it for</text>
