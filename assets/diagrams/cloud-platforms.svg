  <text x="730" y="61" text-anchor="middle" font-size="11" font-weight="700" fill="white">BigQuery</text>

  <!-- Row 1 -->
  <rect x="10" y="78" width="110" height="28" rx="4" fill="#e8eaed"/>
  <text x="20" y="97" font-size="10" font-weight="600" fill="#202124">Storage</text>
  <rect x="125" y="78" width="170" height="28" rx="4" fill="#e0f7fa"/>
  <text x="210" y="97" text-anchor="middle" font-size="9.5" fill="#006064">Columnar, compressed</text>
  <rect x="300" y="78" width="170" height="28" rx="4" fill="#fbe9e7"/>
  <text x="385" y="97" text-anchor="middle" font-size="9.5" fill="#bf360c">Delta Lake (Parquet)</text>
  <rect x="475" y="78" width="170" height="28" rx="4" fill="#fce8e6"/>
  <text x="560" y="97" text-anchor="middle" font-size="9.5" fill="#b71c1c">Columnar, compressed</text>
  <rect x="650" y="78" width="160" height="28" rx="4" fill="#e8f0fe"/>
  <text x="730" y="97" text-anchor="middle" font-size="9.5" fill="#1565c0">Columnar, compressed</text>

  <!-- Row 2 -->
  <rect x="10" y="110" width="110" height="28" rx="4" fill="white"/>
  <text x="20" y="129" font-size="10" font-weight="600" fill="#202124">Partitioning</text>
  <rect x="125" y="110" width="170" height="28" rx="4" fill="white"/>
  <text x="210" y="129" text-anchor="middle" font-size="9.5" fill="#3c4043">Auto (micro-partitions)</text>
  <rect x="300" y="110" width="170" height="28" rx="4" fill="white"/>
  <text x="385" y="129" text-anchor="middle" font-size="9.5" fill="#3c4043">Manual (Delta)</text>
  <rect x="475" y="110" width="170" height="28" rx="4" fill="white"/>
  <text x="560" y="129" text-anchor="middle" font-size="9.5" fill="#3c4043">Distribution keys</text>
  <rect x="650" y="110" width="160" height="28" rx="4" fill="white"/>
  <text x="730" y="129" text-anchor="middle" font-size="9.5" fill="#3c4043">Auto + manual</text>

  <!-- Row 3 -->
  <rect x="10" y="142" width="110" height="28" rx="4" fill="#e8eaed"/>
  <text x="20" y="161" font-size="10" font-weight="600" fill="#202124">Clustering</text>
  <rect x="125" y="142" width="170" height="28" rx="4" fill="#e0f7fa"/>
