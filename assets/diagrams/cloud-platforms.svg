<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 270" font-family="Google Sans, Segoe UI, Arial, sans-serif">
  <rect width="820" height="270" rx="12" fill="#f8f9fa"/>
  <text x="410" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">Cloud Data Platform Comparison</text>

  <rect x="10" y="40" width="110" height="32" rx="6" fill="#5f6368"/>
  <text x="65" y="61" text-anchor="middle" font-size="11" font-weight="700" fill="white">Feature</text>
  <rect x="125" y="40" width="170" height="32" rx="6" fill="#29b5e8"/>
  <text x="210" y="61" text-anchor="middle" font-size="11" font-weight="700" fill="white">Snowflake</text>
  <rect x="300" y="40" width="170" height="32" rx="6" fill="#ff3621"/>
  <text x="385" y="61" text-anchor="middle" font-size="11" font-weight="700" fill="white">Databricks</text>
  <rect x="475" y="40" width="170" height="32" rx="6" fill="#d93025"/>
  <text x="560" y="61" text-anchor="middle" font-size="11" font-weight="700" fill="white">Redshift</text>
