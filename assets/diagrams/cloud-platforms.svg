  <rect x="300" y="142" width="170" height="28" rx="4" fill="#fbe9e7"/>
  <text x="385" y="161" text-anchor="middle" font-size="9.5" fill="#bf360c">Z-ORDER</text>
  <rect x="475" y="142" width="170" height="28" rx="4" fill="#fce8e6"/>
