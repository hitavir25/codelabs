  <rect x="650" y="142" width="160" height="28" rx="4" fill="#e8f0fe"/>
  <text x="730" y="161" text-anchor="middle" font-size="9.5" fill="#1565c0">Clustering columns</text>

  <!-- Row 4 -->
  <rect x="10" y="174" width="110" height="28" rx="4" fill="white"/>
  <text x="20" y="193" font-size="10" font-weight="600" fill="#202124">Format</text>
  <rect x="125" y="174" width="170" height="28" rx="4" fill="white"/>
  <text x="210" y="193" text-anchor="middle" font-size="9.5" fill="#3c4043">Internal</text>
  <rect x="300" y="174" width="170" height="28" rx="4" fill="white"/>
  <text x="385" y="193" text-anchor="middle" font-size="9.5" fill="#3c4043">Delta/Parquet/ORC</text>
  <rect x="475" y="174" width="170" height="28" rx="4" fill="white"/>
  <text x="560" y="193" text-anchor="middle" font-size="9.5" fill="#3c4043">Internal</text>
  <rect x="650" y="174" width="160" height="28" rx="4" fill="white"/>
  <text x="730" y="193" text-anchor="middle" font-size="9.5" fill="#3c4043">Internal</text>

  <!-- Row 5 -->
  <rect x="10" y="206" width="110" height="28" rx="4" fill="#e8eaed"/>
  <text x="20" y="225" font-size="10" font-weight="600" fill="#202124">Best for</text>
  <rect x="125" y="206" width="170" height="28" rx="4" fill="#e0f7fa"/>
  <text x="210" y="225" text-anchor="middle" font-size="9.5" font-weight="600" fill="#006064">Multi-workload</text>
  <rect x="300" y="206" width="170" height="28" rx="4" fill="#fbe9e7"/>
  <text x="385" y="225" text-anchor="middle" font-size="9.5" font-weight="600" fill="#bf360c">ML + Engineering</text>
  <rect x="475" y="206" width="170" height="28" rx="4" fill="#fce8e6"/>
  <text x="560" y="225" text-anchor="middle" font-size="9.5" font-weight="600" fill="#b71c1c">AWS-native analytics</text>
  <rect x="650" y="206" width="160" height="28" rx="4" fill="#e8f0fe"/>
  <text x="730" y="225" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1565c0">Google ecosystem</text>

  <text x="410" y="258" text-anchor="middle" font-size="10" fill="#9aa0a6">HitaVir Tech</text>
</svg>
