<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="Google Sans, Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="s" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="800" height="300" rx="12" fill="#f8f9fa"/>
  <text x="400" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#5f6368">TYPES OF DIMENSION TABLES</text>

  <!-- Regular -->
  <rect x="25" y="48" width="170" height="100" rx="8" fill="#1a73e8" filter="url(#s)"/>
  <text x="110" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="white">Regular</text>
  <line x1="40" y1="80" x2="180" y2="80" stroke="#4d9ef5" stroke-width="1"/>
  <text x="110" y="100" text-anchor="middle" font-size="10" fill="white">Standard attributes</text>
  <text x="110" y="118" text-anchor="middle" font-size="9" fill="#c2d9f7">dim_customer</text>
  <text x="110" y="134" text-anchor="middle" font-size="9" fill="#c2d9f7">dim_product</text>

  <!-- SCD -->
  <rect x="210" y="48" width="170" height="100" rx="8" fill="#34a853" filter="url(#s)"/>
  <text x="295" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="white">Slowly Changing</text>
  <line x1="225" y1="80" x2="365" y2="80" stroke="#5ec97a" stroke-width="1"/>
  <text x="295" y="100" text-anchor="middle" font-size="10" fill="white">Tracks changes</text>
  <text x="295" y="118" text-anchor="middle" font-size="9" fill="#b8e6c4">Type 1: Overwrite</text>
  <text x="295" y="134" text-anchor="middle" font-size="9" fill="#b8e6c4">Type 2: New row</text>

  <!-- Junk -->
  <rect x="395" y="48" width="170" height="100" rx="8" fill="#ea8600" filter="url(#s)"/>
  <text x="480" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="white">Junk</text>
  <line x1="410" y1="80" x2="550" y2="80" stroke="#f5b84d" stroke-width="1"/>
  <text x="480" y="100" text-anchor="middle" font-size="10" fill="white">Low-cardinality flags</text>
  <text x="480" y="118" text-anchor="middle" font-size="9" fill="#fce4b8">is_online: Y/N</text>
  <text x="480" y="134" text-anchor="middle" font-size="9" fill="#fce4b8">payment_type: card/cash</text>

  <!-- Degenerate -->
  <rect x="580" y="48" width="195" height="100" rx="8" fill="#7c3aed" filter="url(#s)"/>
  <text x="677" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="white">Degenerate</text>
  <line x1="595" y1="80" x2="760" y2="80" stroke="#a78bfa" stroke-width="1"/>
  <text x="677" y="100" text-anchor="middle" font-size="10" fill="white">No dim table needed</text>
  <text x="677" y="118" text-anchor="middle" font-size="9" fill="#d4bffc">order_number in fact</text>
  <text x="677" y="134" text-anchor="middle" font-size="9" fill="#d4bffc">invoice_id in fact</text>

  <!-- Role-playing -->
  <rect x="120" y="175" width="260" height="90" rx="8" fill="#d93025" filter="url(#s)"/>
  <text x="250" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="white">Role-Playing</text>
  <line x1="138" y1="208" x2="362" y2="208" stroke="#f28b82" stroke-width="1"/>
  <text x="250" y="228" text-anchor="middle" font-size="10" fill="white">Same dimension, multiple roles</text>
  <text x="250" y="248" text-anchor="middle" font-size="9" fill="#fad2cf">dim_date used as: order_date, ship_date, delivery_date</text>

  <!-- Conformed -->
  <rect x="420" y="175" width="260" height="90" rx="8" fill="#0d47a1" filter="url(#s)"/>
  <text x="550" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="white">Conformed</text>
  <line x1="438" y1="208" x2="662" y2="208" stroke="#42a5f5" stroke-width="1"/>
  <text x="550" y="228" text-anchor="middle" font-size="10" fill="white">Shared across data marts</text>
  <text x="550" y="248" text-anchor="middle" font-size="9" fill="#90caf9">dim_date, dim_customer used in Sales + Finance marts</text>

  <text x="400" y="290" text-anchor="middle" font-size="10" fill="#9aa0a6">HitaVir Tech — Know all dimension types for interviews</text>
</svg>
